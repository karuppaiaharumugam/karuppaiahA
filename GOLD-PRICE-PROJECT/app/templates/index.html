<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Gold Price Prediction</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
    
    <!-- Shared Theme and Socket.IO -->
    <link rel="stylesheet" href="/static/theme.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/theme.js"></script>
    
    <style>
        /* Ensure the body takes up the full screen */
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            /* Prevents scrollbars from background zoom */
        }

        /* ================= BACKGROUND SYSTEM ================= */

        /* Layer 1 (Bottom): The Image Slider */
        #bg-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            /* Fallback color if images fail */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -3;
            transition: background-image 1.2s ease-in-out;
            /* Smooth fade */
            animation: zoomBg 20s infinite alternate ease-in-out;
        }

        /* Layer 2: The Color Tint (Overlay) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: 0.5s;
        }

        body.dark .overlay {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(40, 25, 0, 0.85));
        }

        body.light .overlay {
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 245, 200, 0.8));
        }

        /* Layer 3 (Top Background): Animated Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveParticles 20s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes zoomBg {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        @keyframes moveParticles {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-40px);
            }
        }

        /* ================= UI STYLING ================= */

        .navbar {
            z-index: 10;
            background: transparent !important;
            padding: 15px 30px;
        }

        .form-card {
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 5;
            transition: all 0.5s ease;
            max-width: 500px;
            width: 90%;
        }

        body.dark .form-card {
            background: rgba(15, 15, 15, 0.75);
            border: 1px solid rgba(250, 204, 21, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            color: #facc15;
        }

        .slideshow-container li {
            width: 100%;
            height: 100%;
            position: absolute;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: imageAnimation 32s linear infinite;
        }

        .slideshow-container li:nth-child(1) {
            background-image: url('/static/gold_front_image.jpg');
            animation-delay: 0s;
        }

        .slideshow-container li:nth-child(2) {
            background-image: url('/static/gold_front_image2.jpg');
            animation-delay: 8s;
        }

        .slideshow-container li:nth-child(3) {
            background-image: url('/static/gold_front_image3.jpg');
            animation-delay: 16s;
        }

        .slideshow-container li:nth-child(4) {
            background-image: url('/static/gold_front_image4.jpg');
            animation-delay: 24s;
        }

        body.light .form-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid #eab308;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            color: #78350f;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 18px;
            border-radius: 30px;
            border: 1px solid rgba(128, 128, 128, 0.3);
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: inherit;
        }

        .btn-gold {
            background: linear-gradient(135deg, #facc15, #eab308);
            border: none;
            padding: 14px 40px;
            border-radius: 40px;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-gold:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.5);
        }

        .toggle-btn {
            background: #facc15;
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        body.light .toggle-btn {
            background: #000;
            color: #facc15;
        }

        .flex-center {
            height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body class="dark">
    <ul class="bg-slideshow">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>
    <div class="bg-overlay"></div>

    <div class="particles"></div>

    <nav class="navbar d-flex justify-content-between align-items-center nav-theme">
        <span class="navbar-brand m-0" style="color: var(--gold-primary); font-weight: 800; font-size: 1.5rem;">GOLD-ML</span>
    </nav>

    <div class="flex-center">
        <div class="form-card glass-panel">
            <h2 class="text-center mb-4">Gold Prediction</h2>

            <form action="/display" method="post">
                <label>SPX Index</label>
                <input type="text" name="SPX" placeholder="Value..." required>

                <label>USO (Oil)</label>
                <input type="text" name="USO" placeholder="Value..." required>

                <label>SLV (Silver)</label>
                <input type="text" name="SLV" placeholder="Value..." required>

                <label>EUR/USD</label>
                <input type="text" name="EUR_USD" placeholder="Value..." required>

                <div class="text-center mt-3">
                    <button type="submit" class="btn-gold w-100">Run Prediction</button>
                </div>
            </form>
        </div>
    </div>





</body>

</html>

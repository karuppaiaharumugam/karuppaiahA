<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- Shared Theme and Socket.IO -->
    <link rel="stylesheet" href="/static/theme.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/theme.js"></script>

    <title>Gold Price Prediction App</title>

    <style>
        :root {
            /* Dark Mode: Deep Chocolate Gold */
            --bg-color: #0d0a02;
            --card-bg: rgba(15, 12, 5, 0.75);
            --gold-primary: #facc15;
            --gold-border: linear-gradient(180deg, #facc15 0%, #78350f 100%);
            --text-main: #ffffff;
            --overlay: rgba(0, 0, 0, 0.65);
        }

        [data-theme="light"] {
            /* Light Mode: Champagne Gold */
            --bg-color: #fffbeb;
            --card-bg: rgba(255, 255, 255, 0.85);
            --gold-primary: #b45309;
            --gold-border: linear-gradient(180deg, #fbbf24 0%, #b45309 100%);
            --text-main: #1a1a1a;
            --overlay: rgba(255, 251, 235, 0.4);
        }

        body,
        html {
            height: 100%;
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            transition: all 0.5s ease;
            overflow-x: hidden;
        }

        /*******************************/
        /****** 4-IMAGE SLIDESHOW ******/
        /*******************************/
        .slideshow-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -2;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .slideshow-container li {
            width: 100%;
            height: 100%;
            position: absolute;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: imageAnimation 32s linear infinite;
        }

        .slideshow-container li:nth-child(1) {
            background-image: url('/static/gold_front_image.jpg');
            animation-delay: 0s;
        }

        .slideshow-container li:nth-child(2) {
            background-image: url('/static/gold_front_image2.jpg');
            animation-delay: 8s;
        }

        .slideshow-container li:nth-child(3) {
            background-image: url('/static/gold_front_image3.jpg');
            animation-delay: 16s;
        }

        .slideshow-container li:nth-child(4) {
            background-image: url('/static/gold_front_image4.jpg');
            animation-delay: 24s;
        }

        @keyframes imageAnimation {
            0% {
                opacity: 0;
                transform: scale(1);
            }

            5% {
                opacity: 1;
            }

            25% {
                opacity: 1;
            }

            30% {
                opacity: 0;
                transform: scale(1.05);
            }

            100% {
                opacity: 0;
            }
        }

        .ui-overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: var(--overlay);
            z-index: -1;
        }

        /*******************************/
        /********* UI DESIGN ***********/
        /*******************************/
        .navbar {
            background: transparent !important;
            padding: 30px 0;
        }

        .navbar-brand {
            color: var(--gold-primary) !important;
            font-weight: 800;
            letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .market-title {
            color: var(--gold-primary);
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-size: clamp(1.5rem, 5vw, 3rem);
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .gold-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 60px 40px;
            position: relative;
            max-width: 600px;
            margin: auto;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .gold-card::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: var(--gold-border);
            z-index: -1;
            border-radius: 27px;
            opacity: 0.8;
        }

        .spot-label {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .result-text {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            color: var(--gold-primary);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.4));
        }

        .btn-gold {
            background: var(--gold-primary);
            color: #000 !important;
            font-weight: 800;
            padding: 15px 45px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            border: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-5px);
            filter: brightness(1.2);
            box-shadow: 0 15px 30px rgba(250, 204, 21, 0.3);
        }

        /* Fixed Top-Right Theme Button */
        .theme-btn-top {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1001;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--gold-primary);
            color: var(--gold-primary);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            outline: none !important;
        }

        .theme-btn-top:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--gold-primary);
            color: #000;
        }

        [data-theme="light"] .theme-btn-top {
            background: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>
    <ul class="bg-slideshow">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>
    <div class="bg-overlay"></div>



    <nav class="navbar container text-center">
        <!-- <span class="navbar-brand mx-auto">PREMIUM ML PROJECTS</span> -->
    </nav>

    <div class="container text-center">
        <h1 class="market-title">Market Gold Price</h1>

        <div class="gold-card glass-panel">
            <div class="spot-label">Live Spot Rate (USD)</div>

            <div class="result-text">
                ${{ result }}
            </div>

            <p style="opacity: 0.6; font-size: 0.9rem;">Real-time Analysis per Gram (24K)</p>

            <a href="/" class="btn btn-gold mt-4">Predict Again</a>
        </div>
    </div>

    <!-- Global Chatbot -->
    <script src="/static/chatbot.js"></script>



</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Portal | Create Account</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <style>
        :root {
            /* DARK THEME (Default) */
            --gold: #FFD700;
            --gold-dark: #b8860b;
            --glass-bg: rgba(0, 0, 0, 0.75);
            --text-color: #ffffff;
            --card-border: rgba(255, 215, 0, 0.3);
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            /* LIGHT THEME */
            --glass-bg: rgba(255, 255, 255, 0.9);
            --text-color: #1a1a1a;
            --card-border: rgba(184, 134, 11, 0.5);
            --input-bg: #f8f8f8;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body,
        html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- DYNAMIC BACKGROUND SLIDER --- */
        .bg-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background-color: #000;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: smoothSlide 24s infinite;
        }

        /* Synced with your uploaded gold images */
        .bg-slide:nth-child(1) {
            background-image: url('/static/gold_front_image.jpg');
            animation-delay: 0s;
        }

        .bg-slide:nth-child(2) {
            background-image: url('/static/gold_front_image2.jpg');
            animation-delay: 6s;
        }

        .bg-slide:nth-child(3) {
            background-image: url('/static/gold_front_image3.jpg');
            animation-delay: 12s;
        }

        .bg-slide:nth-child(4) {
            background-image: url('/static/gold_front_image4.jpg');
            animation-delay: 18s;
        }

        @keyframes smoothSlide {
            0% {
                opacity: 0;
                transform: scale(1);
            }

            5% {
                opacity: 1;
            }

            25% {
                opacity: 1;
                transform: scale(1.08);
            }

            30% {
                opacity: 0;
                transform: scale(1.1);
            }

            100% {
                opacity: 0;
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -2;
        }

        /* --- REGISTER CARD --- */
        .register-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 95%;
            max-width: 400px;
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
            text-align: center;
            z-index: 10;
            color: var(--text-color);
        }

        h2 {
            color: var(--gold);
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .input-icon {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
        }

        .input-icon input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            background: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 50px;
            outline: none;
            color: var(--text-color);
            font-size: 16px;
        }

        .input-icon input:focus {
            border-color: var(--gold);
        }

        input[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        input[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.4);
        }

        .links {
            margin-top: 25px;
        }

        .links a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }

        /* --- THEME TOGGLE --- */
        .theme-switch {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--glass-bg);
            border: 1px solid var(--card-border);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--gold);
            font-size: 22px;
            z-index: 100;
        }
    </style>
</head>

<body class="dark">

    <div class="bg-slider">
        <div class="bg-slide"></div>
        <div class="bg-slide"></div>
        <div class="bg-slide"></div>
        <div class="bg-slide"></div>
    </div>

    <div class="overlay"></div>

    <div class="theme-switch" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <div class="register-container">
        <h2>Create Account</h2>

        <form method="POST">
            <div class="input-icon">
                <i class="fa fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-icon">
                <i class="fa fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="input-icon">
                <i class="fa fa-envelope"></i>
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <input type="submit" value="Get Started">
        </form>

        <div class="links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                body.setAttribute('data-theme', 'light');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }
    </script>

</body>

</html>

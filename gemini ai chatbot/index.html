<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>
    <div class="chat-container glassmorphism">
        <header class="chat-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z" fill="#A855F7"/>
                </svg>
                <h1>Gemini AI</h1>
            </div>
            <p class="subtitle">Ask me anything (Supports PDF, TXT, and Images)</p>
        </header>
        
        <div class="chat-box" id="chatBox">
            <div class="message ai">
                <div class="message-content">
                    Hello! I am Gemini. I can read images, PDFs, and text files. How can I help you today?
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="file-preview-container" id="filePreviewContainer" style="display: none;">
                <span id="fileNameDisplay" class="file-name"></span>
                <button id="removeFileBtn" class="remove-file-btn" aria-label="Remove File">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            
            <div class="input-row">
                <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp, image/heic, image/heif, application/pdf, text/plain" style="display: none;" />
                <button id="attachBtn" class="attach-btn" aria-label="Attach File">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21.44 11.05L12.25 20.24C11.1242 21.3658 9.5973 21.9983 8.005 21.9983C6.4127 21.9983 4.8858 21.3658 3.76 20.24C2.6342 19.1142 2.0017 17.5873 2.0017 15.995C2.0017 14.4027 2.6342 12.8758 3.76 11.75L12.95 2.56001C13.7005 1.80947 14.7183 1.38782 15.78 1.38782C16.8417 1.38782 17.8595 1.80947 18.61 2.56001C19.3605 3.31054 19.7822 4.32832 19.7822 5.39001C19.7822 6.45169 19.3605 7.46947 18.61 8.22001L9.41 17.41C9.0347 17.7853 8.5256 17.9961 7.995 17.9961C7.4644 17.9961 6.9553 17.7853 6.58 17.41C6.2047 17.0347 5.9939 16.5256 5.9939 15.995C5.9939 15.4644 6.2047 14.9553 6.58 14.58L15.07 6.09001" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off" />
                <button id="sendBtn" class="send-btn" aria-label="Send Message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
